<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpiderCut — by uzzzaif</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0e0e0e;
      color: #e8e8e8;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      width: 100%;
      max-width: 480px;
      background: #161616;
      border: 1px solid #242424;
      border-radius: 12px;
      padding: 32px;
    }

    .header { margin-bottom: 28px; }

    .logo {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }
    .logo .spider { color: #e8001c; }

    .sub {
      margin-top: 4px;
      font-size: 13px;
      color: #555;
    }

    #drop-zone {
      border: 1.5px dashed #2e2e2e;
      border-radius: 8px;
      padding: 36px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    #drop-zone:hover, #drop-zone.dragover {
      border-color: #e8001c;
      background: rgba(232,0,28,0.04);
    }

    .drop-icon { font-size: 28px; margin-bottom: 10px; opacity: 0.6; }
    .drop-title { font-size: 14px; font-weight: 500; color: #ccc; margin-bottom: 4px; }
    .drop-hint  { font-size: 12px; color: #444; }

    #file-info {
      display: none;
      margin-top: 10px;
      padding: 10px 14px;
      background: #1e1e1e;
      border-radius: 6px;
      align-items: center;
      gap: 10px;
    }
    #file-info.visible { display: flex; }

    #file-name {
      font-size: 13px; color: #ccc; flex: 1;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    #file-size { font-size: 12px; color: #555; flex-shrink: 0; }
    #clear-btn {
      background: none; border: none; color: #444;
      cursor: pointer; font-size: 16px; line-height: 1;
      padding: 0; flex-shrink: 0; transition: color 0.1s;
    }
    #clear-btn:hover { color: #e8001c; }

    .controls { margin-top: 14px; display: flex; gap: 8px; }

    button {
      font-family: 'Inter', sans-serif;
      font-size: 13px; font-weight: 500;
      cursor: pointer; border: none; border-radius: 6px; outline: none;
      transition: all 0.12s;
    }

    #browse-btn {
      padding: 10px 16px;
      background: #222; color: #888;
      border: 1px solid #2e2e2e;
    }
    #browse-btn:hover { color: #ccc; border-color: #444; }

    #convert-btn {
      flex: 1; padding: 10px;
      background: #e8001c; color: #fff;
    }
    #convert-btn:hover:not(:disabled) { background: #c4001a; }
    #convert-btn:disabled { background: #222; color: #444; cursor: not-allowed; }

    #status-box {
      display: none;
      margin-top: 14px; padding: 12px 14px;
      border-radius: 6px; border: 1px solid #2e2e2e; background: #1a1a1a;
    }
    #status-box.visible { display: block; }
    #status-box.error   { border-color: #e8001c; background: #1a0808; }
    #status-box.success { border-color: #1d7a3a; background: #0a1a10; }

    .status-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }

    .spinner {
      width: 13px; height: 13px;
      border: 2px solid #333; border-top-color: #e8001c;
      border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status-label {
      font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .status-label.processing { color: #e8001c; }
    .status-label.error      { color: #e8001c; }
    .status-label.success    { color: #3dba65; }

    #status-msg { font-size: 12px; color: #555; line-height: 1.5; white-space: pre-wrap; }

    #progress-bar-wrap {
      display: none; margin-top: 8px;
      height: 2px; background: #2a2a2a; border-radius: 2px; overflow: hidden;
    }
    #progress-bar-wrap.visible { display: block; }
    #progress-bar {
      height: 100%; background: #e8001c; width: 40%;
      animation: slide 1.2s ease-in-out infinite;
    }
    @keyframes slide {
      0%   { transform: translateX(-150%); }
      100% { transform: translateX(350%); }
    }

    #download-btn {
      display: none; margin-top: 10px; width: 100%; padding: 10px;
      background: #1d7a3a; color: #fff; border-radius: 6px;
      font-size: 13px; font-weight: 500;
    }
    #download-btn:hover { background: #175e2d; }
    #download-btn.visible { display: block; }

    .footer {
      margin-top: 24px; font-size: 11px; color: #333;
      display: flex; justify-content: space-between; align-items: center;
    }
    .footer .by { color: #e8001c; opacity: 0.7; }

    #file-input { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="logo"><span class="spider">Spider</span>Cut</div>
      <div class="sub">Convert video to 1080×1080 square</div>
    </div>

    <input type="file" id="file-input" accept=".mp4,.mov,.mkv" />

    <div id="drop-zone">
      <div class="drop-icon">🕷</div>
      <div class="drop-title">Drop your video here</div>
      <div class="drop-hint">MP4 · MOV · MKV · max 100 MB</div>
    </div>

    <div id="file-info">
      <span id="file-name">—</span>
      <span id="file-size"></span>
      <button id="clear-btn">×</button>
    </div>

    <div class="controls">
      <button id="browse-btn">Browse</button>
      <button id="convert-btn" disabled>Convert to Square</button>
    </div>

    <div id="status-box">
      <div class="status-row">
        <div class="spinner" id="spinner"></div>
        <span class="status-label" id="status-label-text">Processing</span>
      </div>
      <div id="status-msg"></div>
      <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
    </div>

    <button id="download-btn">↓ Download square_output.mp4</button>

    <div class="footer">
      <span class="by">by uzzzaif</span>
      <span>1080×1080 · libx264 · crf 23</span>
    </div>
  </div>

  <script>
    const API = '';
    const dropZone    = document.getElementById('drop-zone');
    const fileInput   = document.getElementById('file-input');
    const fileInfo    = document.getElementById('file-info');
    const fileName    = document.getElementById('file-name');
    const fileSize    = document.getElementById('file-size');
    const clearBtn    = document.getElementById('clear-btn');
    const browseBtn   = document.getElementById('browse-btn');
    const convertBtn  = document.getElementById('convert-btn');
    const statusBox   = document.getElementById('status-box');
    const statusLabel = document.getElementById('status-label-text');
    const statusMsg   = document.getElementById('status-msg');
    const progressWrap= document.getElementById('progress-bar-wrap');
    const spinner     = document.getElementById('spinner');
    const downloadBtn = document.getElementById('download-btn');

    let selectedFile = null, downloadURL = null;

    function formatBytes(b) {
      return b < 1048576 ? (b/1024).toFixed(1)+' KB' : (b/1048576).toFixed(1)+' MB';
    }

    function setFile(file) {
      const ext = '.'+file.name.split('.').pop().toLowerCase();
      if (!['.mp4','.mov','.mkv'].includes(ext)) { showStatus('error','Invalid file type. Accepted: MP4, MOV, MKV.'); return; }
      if (file.size > 100*1024*1024) { showStatus('error','File too large. Max 100 MB.'); return; }
      selectedFile = file;
      fileName.textContent = file.name;
      fileSize.textContent = formatBytes(file.size);
      fileInfo.classList.add('visible');
      convertBtn.disabled = false;
      hideStatus();
      downloadBtn.classList.remove('visible');
    }

    function clearFile() {
      selectedFile = null; fileInput.value = '';
      fileInfo.classList.remove('visible');
      convertBtn.disabled = true;
      hideStatus(); downloadBtn.classList.remove('visible');
      if (downloadURL) { URL.revokeObjectURL(downloadURL); downloadURL = null; }
    }

    function hideStatus() {
      statusBox.className = ''; progressWrap.classList.remove('visible');
    }

    function showStatus(type, msg) {
      statusBox.className = 'visible ' + type;
      statusLabel.className = 'status-label ' + type;
      statusLabel.textContent = type === 'processing' ? 'Processing' : type === 'error' ? 'Error' : 'Done';
      spinner.style.display = type === 'processing' ? 'block' : 'none';
      statusMsg.textContent = msg;
      type === 'processing' ? progressWrap.classList.add('visible') : progressWrap.classList.remove('visible');
    }

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]); });
    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });
    browseBtn.addEventListener('click', () => fileInput.click());
    clearBtn.addEventListener('click', clearFile);

    convertBtn.addEventListener('click', async () => {
      if (!selectedFile) return;
      convertBtn.disabled = true; browseBtn.disabled = true;
      downloadBtn.classList.remove('visible');
      showStatus('processing', 'Converting via FFmpeg...');
      const fd = new FormData();
      fd.append('video', selectedFile);
      try {
        const res = await fetch(`${API}/upload`, { method: 'POST', body: fd });
        if (!res.ok) {
          let msg = 'Conversion failed.';
          try { const j = await res.json(); msg = j.error || msg; if (j.details) msg += '\n\n' + j.details; } catch(_) {}
          showStatus('error', msg); return;
        }
        const blob = await res.blob();
        if (downloadURL) URL.revokeObjectURL(downloadURL);
        downloadURL = URL.createObjectURL(blob);
        downloadBtn.classList.add('visible');
        downloadBtn.onclick = () => { const a = document.createElement('a'); a.href = downloadURL; a.download = 'square_output.mp4'; a.click(); };
        showStatus('success', 'Your 1080×1080 video is ready.');
      } catch(e) {
        showStatus('error', 'Cannot reach backend. Is the server running?');
      } finally {
        convertBtn.disabled = false; browseBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
